<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRAHMS - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
        }
        .auth-card h2 {
            margin-bottom: 1.5rem;
            color: var(--text-dark);
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }
        .btn-full {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .toggle-form {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .toggle-form a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .toggle-form a:hover {
            text-decoration: underline;
        }
        #signup-form {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div class="auth-card" id="login-form-container">
            <h2>Welcome to STRAHMS</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Log In</button>
            </form>
            <div class="toggle-form">
                Don't have an account? <a href="#" id="show-signup">Sign up</a>
            </div>
            <div id="login-error" class="error-msg" style="display: none; color: red; margin-top: 10px; text-align: center; font-size: 0.9rem;"></div>
        </div>

        <!-- Signup Form -->
        <div class="auth-card" id="signup-form-container" style="display: none;">
            <h2>Create Account</h2>
            <form id="signup-form-el">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="signup-name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" required>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label>Age</label>
                        <input type="number" id="signup-age" required>
                    </div>
                    <div style="flex: 2;">
                        <label>Occupation</label>
                        <select id="signup-occupation">
                            <option value="Student">Student</option>
                            <option value="Office Worker">Office Worker</option>
                            <option value="Normal User" selected>Normal User</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
            </form>
            <div class="toggle-form">
                Already have an account? <a href="#" id="show-login">Log in</a>
            </div>
            <div id="signup-error" class="error-msg" style="display: none; color: red; margin-top: 10px; text-align: center; font-size: 0.9rem;"></div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
